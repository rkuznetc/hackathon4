services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: toll_roads
    # 5433 на хосте — если локальный PostgreSQL уже занял 5432
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon -d toll_roads"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - toll_net

  # Backend — FastAPI, подключение к db по DATABASE_URL
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      DATABASE_URL: postgresql://hackathon:hackathon@db:5432/toll_roads
      SECRET_KEY: dev-secret-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - toll_net

networks:
  toll_net:
    driver: bridge

volumes:
  postgres_data:
